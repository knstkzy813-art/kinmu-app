<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>リアルタイム勤務表システム Pro V20.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --cell-width: 44px; --cell-height: 24px; --global-ratio: 3.0; }
        .duty-cell { min-width: var(--cell-width) !important; max-width: var(--cell-width) !important; width: var(--cell-width) !important; height: var(--cell-height) !important; text-align: center; font-size: 11px; white-space: nowrap; overflow: hidden; }
        .global-cell { height: calc(var(--cell-height) * var(--global-ratio)) !important; min-height: calc(var(--cell-height) * var(--global-ratio)) !important; max-height: calc(var(--cell-height) * var(--global-ratio)) !important; padding: 0 !important; overflow: hidden !important; }
        .sticky-col { position: sticky; left: 0; background: white; z-index: 20; min-width: 70px; }
        .user-select-btn { width: 100%; padding: 12px; background: #f9fafb; border: 2px solid #e5e7eb; border-radius: 12px; font-weight: bold; color: #4b5563; }
    </style>
</head>
<body class="bg-gray-100">

    <div id="loginScreen" class="flex items-center justify-center min-h-screen p-4">
        <div class="bg-white rounded-2xl shadow-xl max-w-sm w-full p-6 border">
            <h2 class="text-xl font-bold text-center mb-6">勤務管理システム</h2>
            <button id="openUserModalBtn" class="user-select-btn mb-4">
                <i class="fa-solid fa-user mr-2"></i><span id="selectedUserLabel">職員を選択してください</span>
            </button>
            <input type="hidden" id="loginUserHidden">
            <input type="password" id="loginPassword" placeholder="パスワード" class="w-full border rounded-lg px-3 py-3 mb-4 text-sm">
            <button id="authBtn" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-lg">ログイン</button>
        </div>
    </div>

    <div id="mainSystem" class="hidden">
        <nav class="bg-indigo-600 text-white p-3 flex justify-between items-center">
            <span class="font-bold text-sm">勤務管理 Pro</span>
            <button id="logoutBtn" class="bg-indigo-800 px-3 py-1 rounded text-xs">ログアウト</button>
        </nav>
        <div id="tableContainer" class="p-2 overflow-x-auto">
            </div>
    </div>

    <div id="userSelectorModal" class="fixed inset-0 bg-black/60 hidden items-center justify-center z-[100] p-3">
        <div class="bg-white rounded-xl max-w-sm w-full p-4 max-h-[80vh] flex flex-col">
            <h3 class="font-bold mb-4">職員を選択</h3>
            <div id="userSelectorGrid" class="grid grid-cols-2 gap-2 overflow-y-auto"></div>
        </div>
    </div>

    <script>
        // データ構造の復旧
        let state = {
            currentUser: "",
            staffsData: [{ name: "管理者", pass: "admin", role: "admin" }],
            duties: {},
            globalScheduleMeet: {},
            customWidth: 44,
            customHeight: 24,
            customRatio: 3.0
        };

        // ローカルストレージからデータを読み込む関数（重要！）
        function loadData() {
            const saved = localStorage.getItem("gemini_duty_system_v13_state");
            if (saved) {
                const parsed = JSON.parse(saved);
                state = { ...state, ...parsed }; // 以前のデータをstateに上書き
            }
        }

        function toggleModal(id, show) { document.getElementById(id).style.display = show ? "flex" : "none"; }

        function openUserSelector() {
            const grid = document.getElementById("userSelectorGrid");
            grid.innerHTML = "";
            state.staffsData.forEach(user => {
                const btn = document.createElement("button");
                btn.className = "p-3 bg-gray-50 border rounded-lg font-bold text-sm hover:bg-indigo-100";
                btn.textContent = user.name;
                btn.onclick = () => {
                    document.getElementById("selectedUserLabel").textContent = user.name;
                    document.getElementById("loginUserHidden").value = user.name;
                    toggleModal("userSelectorModal", false);
                };
                grid.appendChild(btn);
            });
            toggleModal("userSelectorModal", true);
        }

        document.getElementById("openUserModalBtn").addEventListener("click", openUserSelector);
        document.getElementById("authBtn").addEventListener("click", () => {
            const name = document.getElementById("loginUserHidden").value;
            if (name) {
                document.getElementById("loginScreen").classList.add("hidden");
                document.getElementById("mainSystem").classList.remove("hidden");
                // ここで本来のテーブル生成処理を呼び出します
            } else { alert("職員を選んでください"); }
        });

        // 起動時にデータを読み込む
        window.onload = loadData;
    </script>
</body>
</html>
