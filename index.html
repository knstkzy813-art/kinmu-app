<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>リアルタイム勤務表システム Pro V11</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        /* 💻 パソコン用のサイズ設定（勤務が1行で収まる横幅 ＆ 高さを狭く） */
        .duty-cell { min-width: 44px; max-width: 44px; height: 28px; text-align: center; font-size: 11px; white-space: nowrap; overflow: hidden; }
        .global-cell { height: 120px; }
        
        /* 📌 テーブルの左側（名前・区分）固定設定 */
        .sticky-col { position: sticky; left: 0; background-color: white; z-index: 20; box-shadow: 2px 0 5px -2px rgba(0,0,0,0.1); min-width: 70px; max-width: 70px; }
        .sticky-col-2 { position: sticky; left: 70px; background-color: white; z-index: 20; box-shadow: 2px 0 5px -2px rgba(0,0,0,0.1); min-width: 36px; max-width: 36px; }
        
        /* 共通予定の縦書き設定 */
        .vertical-text {
            writing-mode: vertical-rl;
            text-orientation: mixed;
            white-space: nowrap;
        }
        
        /* 📱 スマホ（画面幅768px以下）での表示崩れ防止・最適化設定 */
        @media (max-width: 768px) {
            .duty-cell { min-width: 42px; max-width: 42px; height: 26px; font-size: 10px; }
            .global-cell { height: 120px; }
            .sticky-col { left: 0; min-width: 65px !important; max-width: 65px !important; }
            .sticky-col-2 { left: 65px; min-width: 32px !important; max-width: 32px !important; font-size: 9px; }
            input.duty-input { font-size: 9px; }
            .vertical-text { font-size: 10px; }
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans min-h-screen">

    <div id="loginScreen" class="flex items-center justify-center min-h-screen p-4">
        <div class="bg-white rounded-2xl shadow-xl max-w-md w-full p-6 sm:p-8 border border-gray-100">
            <div class="text-center mb-6">
                <div class="bg-indigo-100 text-indigo-600 w-14 h-14 rounded-full flex items-center justify-center mx-auto mb-3 text-xl shadow-sm">
                    <i class="fa-solid fa-lock"></i>
                </div>
                <h2 class="text-xl sm:text-2xl font-bold text-gray-800 tracking-tight">勤務管理システム ログイン</h2>
                <p class="text-xs text-gray-400 mt-1">名前とパスワードを入力してください</p>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1">職員名</label>
                    <select id="loginUserSelect" class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-indigo-500 bg-white font-medium"></select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1">パスワード</label>
                    <input type="password" id="loginPassword" placeholder="••••••••" class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-indigo-500">
                </div>
                <button id="authBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2.5 rounded-lg shadow-md hover:shadow-lg transition-all flex items-center justify-center space-x-2">
                    <i class="fa-solid fa-right-to-bracket"></i> <span>ログインする</span>
                </button>
            </div>
        </div>
    </div>


    <div id="mainSystem" class="hidden">
        <nav class="bg-indigo-600 text-white shadow-md px-3 sm:px-4 py-3 flex justify-between items-center sticky top-0 z-50">
            <div class="flex items-center space-x-2">
                <i class="fa-solid fa-table-list mr-1 text-base sm:text-xl"></i>
                <span class="font-bold text-sm sm:text-lg tracking-wider">勤務管理 Pro V11</span>
            </div>
            <div class="flex items-center space-x-2 sm:space-x-4">
                <span id="loginStatus" class="bg-indigo-700 px-2 sm:px-3 py-1 rounded text-xs sm:text-sm font-medium"></span>
                <button id="logoutBtn" class="text-[10px] sm:text-xs bg-indigo-800 hover:bg-indigo-900 px-2 py-1 rounded border border-indigo-500/50 flex items-center space-x-1"><i class="fa-solid fa-arrow-right-from-bracket"></i> <span class="hidden sm:inline">ログアウト</span></button>
            </div>
        </nav>

        <main class="p-2 sm:p-6 max-w-7xl mx-auto space-y-4 sm:space-y-6">
            <div class="bg-white rounded-xl shadow-sm p-3 sm:p-4 flex flex-col md:flex-wrap md:flex-row gap-3 justify-between items-stretch md:items-center">
                <div class="flex flex-wrap items-center gap-3">
                    <div class="flex-1 md:flex-none">
                        <label class="block text-[10px] text-gray-500 font-bold mb-0.5">表示月</label>
                        <select id="monthSelect" class="w-full md:w-auto border border-gray-300 rounded px-2.5 py-1.5 text-xs sm:text-sm focus:ring-2 focus:ring-indigo-500 bg-white">
                            <option value="2026-05">2026年5月</option>
                            <option value="2026-06">2026年6月</option>
                        </select>
                    </div>
                    
                    <div id="adminConfig" class="hidden bg-green-50 p-2 rounded border border-green-200 flex items-center space-x-2 shadow-inner w-full md:w-auto">
                        <i class="fa-solid fa-sliders text-green-600 text-xs ml-1"></i>
                        <span class="text-[11px] text-green-700 font-bold">公休基準:</span>
                        <input type="number" id="baseOffDays" value="9" class="w-10 border border-green-300 text-center text-xs font-bold rounded py-0.5 focus:ring-2 focus:ring-green-500">
                        <span class="text-[11px] text-green-700">日</span>
                        <button id="saveConfigBtn" class="bg-green-600 text-white text-[11px] px-2 py-1 rounded font-bold hover:bg-green-700 transition-colors shadow-sm flex items-center space-x-1">
                            <i class="fa-solid fa-users"></i> <span>一括適用</span>
                        </button>
                    </div>
                </div>

                <div class="grid grid-cols-2 sm:flex sm:flex-wrap gap-2">
                    <button id="btnExcel" class="bg-emerald-600 hover:bg-emerald-700 text-white text-xs px-2.5 py-2 rounded flex items-center justify-center space-x-1 shadow-sm"><i class="fa-solid fa-file-excel"></i> <span>Excel出力</span></button>
                    <button id="btnPdf" class="bg-rose-600 hover:bg-rose-700 text-white text-xs px-2.5 py-2 rounded flex items-center justify-center space-x-1 shadow-sm"><i class="fa-solid fa-file-pdf"></i> <span>PDF出力</span></button>
                    <button id="btnEmail" class="bg-blue-600 hover:bg-blue-700 text-white text-xs px-2.5 py-2 rounded flex items-center justify-center space-x-1 shadow-sm"><i class="fa-solid fa-envelope"></i> <span>メール送信</span></button>
                    <button id="btnDutyMgmt" class="hidden bg-amber-600 hover:bg-amber-700 text-white text-xs px-2.5 py-2 rounded flex items-center justify-center space-x-1 shadow-sm"><i class="fa-solid fa-business-time"></i> <span>勤務形態管理</span></button>
                    <button id="btnStaffMgmt" class="hidden bg-gray-600 hover:bg-gray-700 text-white text-xs px-2.5 py-2 rounded flex items-center justify-center space-x-1 shadow-sm"><i class="fa-solid fa-users-gear"></i> <span>職員管理</span></button>
                </div>
            </div>

            <div id="tableContainer" class="bg-white rounded-xl shadow-sm overflow-x-auto border border-gray-200 block max-w-full">
                <table class="text-left border-collapse table-fixed w-max" id="dutyTable">
                    <thead>
                        <tr id="headerRowDays" class="bg-gray-100 text-[11px] font-bold text-gray-600"></tr>
                        <tr id="headerRowWeeks" class="bg-gray-50 text-[11px] font-bold text-gray-500 border-b border-gray-200"></tr>
                        <tr id="globalScheduleRow" class="bg-amber-50 text-[11px] font-bold border-b border-gray-300"></tr>
                    </thead>
                    <tbody id="dutyTableBody" class="divide-y divide-gray-200"></tbody>
                    <tfoot>
                        <tr id="totalCountRow" class="bg-indigo-50 font-bold text-[11px] text-indigo-900 border-t-2 border-indigo-200"></tr>
                    </tfoot>
                </table>
            </div>
            
            <div class="bg-white rounded-xl shadow-sm p-3 text-[11px] text-gray-500 flex flex-col sm:flex-row gap-3 sm:gap-6">
                <div class="flex items-center">
                    <span class="inline-block w-3.5 h-3.5 bg-red-100 border border-red-300 rounded mr-1.5"></span>
                    <span class="font-bold text-red-700">赤色：公休超過（休みすぎ）</span>
                </div>
                <div class="flex items-center">
                    <span class="inline-block w-3.5 h-3.5 bg-orange-100 border border-orange-300 rounded mr-1.5"></span>
                    <span class="font-bold text-orange-600">橙色：公休不足（働きすぎ・未消化）</span>
                </div>
            </div>
        </main>
    </div>

    <div id="dutySelectorModal" class="fixed inset-0 bg-black/60 hidden items-center justify-center z-[100] p-3 transition-opacity">
        <div class="bg-white rounded-xl max-w-2xl w-full p-4 sm:p-6 shadow-2xl border border-gray-100 flex flex-col max-h-[90vh]">
            <div class="flex justify-between items-center border-b pb-2.5 mb-3">
                <div>
                    <h3 id="selectorModalTitle" class="font-bold text-base sm:text-lg text-gray-800">勤務を選択</h3>
                    <p id="selectorModalSub" class="text-[11px] text-gray-400 mt-0.5"></p>
                </div>
                <button id="closeSelectorModal" class="text-gray-400 hover:text-gray-600 p-1"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <div id="dutySelectorGrid" class="grid grid-cols-3 sm:grid-cols-6 gap-2 overflow-y-auto p-0.5 flex-1"></div>
        </div>
    </div>

    <div id="dutyModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50 p-3">
        <div class="bg-white rounded-xl max-w-md w-full p-5 shadow-xl max-h-[90vh] flex flex-col">
            <div class="flex justify-between items-center border-b pb-2.5 mb-3">
                <h3 class="font-bold text-base text-gray-800"><i class="fa-solid fa-business-time text-amber-600 mr-2"></i>勤務形態のマスタ管理</h3>
                <button id="closeDutyModal" class="text-gray-400 hover:text-gray-600"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <div class="space-y-4 overflow-y-auto pr-0.5">
                <div class="bg-gray-50 p-3 rounded border space-y-3">
                    <p class="text-xs font-bold text-gray-600">新規勤務形態の登録</p>
                    <div>
                        <label class="block text-[11px] text-gray-500 mb-1">勤務形態名</label>
                        <input type="text" id="newDutyName" placeholder="例：早番、遅番、有給" class="w-full border border-gray-300 rounded px-2.5 py-1.5 text-xs focus:ring-2 focus:ring-amber-500">
                    </div>
                    <div>
                        <label class="block text-[11px] text-gray-500 mb-1">公休数換算</label>
                        <select id="newDutyOffValue" class="w-full border border-gray-300 rounded px-2.5 py-1.5 text-xs focus:ring-2 focus:ring-amber-500 bg-white">
                            <option value="0">0 (通常の出勤シフト)</option>
                            <option value="0.5">0.5 (半日休み / △等)</option>
                            <option value="1">1 (完全な公休・有給 / 〇等)</option>
                        </select>
                    </div>
                    <button id="addDutyBtn" class="w-full bg-amber-600 hover:bg-amber-700 text-white text-xs py-2 rounded font-bold transition-colors">勤務形態を追加</button>
                </div>
                <div class="border rounded divide-y max-h-40 overflow-y-auto" id="dutyManagementList"></div>
            </div>
        </div>
    </div>

    <div id="staffModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50 p-3">
        <div class="bg-white rounded-xl max-w-lg w-full p-5 shadow-xl max-h-[90vh] flex flex-col">
            <div class="flex justify-between items-center border-b pb-2.5 mb-3">
                <h3 class="font-bold text-base text-gray-800"><i class="fa-solid fa-users-gear text-indigo-600 mr-2"></i>職員追加 ＆ パスワード設定</h3>
                <button id="closeStaffModal" class="text-gray-400 hover:text-gray-600"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <div class="space-y-4 overflow-y-auto pr-0.5">
                <div class="bg-gray-50 p-3 rounded border space-y-3">
                    <p class="text-xs font-bold text-gray-600">新規職員の登録</p>
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-[11px] text-gray-500 mb-1">氏名(苗字)</label>
                            <input type="text" id="newStaffName" placeholder="例：高橋" class="w-full border border-gray-300 rounded px-2.5 py-1.5 text-xs focus:ring-2 focus:ring-indigo-500">
                        </div>
                        <div>
                            <label class="block text-[11px] text-gray-500 mb-1">パスワード</label>
                            <input type="text" id="newStaffPass" placeholder="初期値: 1234" value="1234" class="w-full border border-gray-300 rounded px-2.5 py-1.5 text-xs focus:ring-2 focus:ring-indigo-500">
                        </div>
                    </div>
                    <button id="addStaffBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white text-xs py-2 rounded font-bold transition-colors">職員を新規追加</button>
                </div>
                <div class="border rounded divide-y bg-white max-h-44 overflow-y-auto" id="staffManagementList"></div>
            </div>
        </div>
    </div>

    <script>
        const HOLIDAYS_2026 = [
            "2026-01-01", "2026-01-12", "2026-02-11", "2026-02-23",
            "2026-03-20", "2026-04-29", "2026-05-03", "2026-05-04",
            "2026-05-05", "2026-05-06", "2026-07-20", "2026-08-11",
            "2026-09-21", "2026-09-22", "2026-09-23", "2026-10-12",
            "2026-11-03", "2026-11-23", "2026-12-23"
        ];

        let state = {
            currentMonth: "2026-05",
            currentUser: "",
            isAdmin: false,
            baseOffDays: 9,
            activeCellTarget: null, 
            staffsData: [
                { name: "管理者", pass: "admin", role: "admin" },
                { name: "佐藤", pass: "1234", role: "user" }
            ],
            dutyStyles: [
                { name: "", offValue: 0 },
                { name: "/", offValue: 0 },
                { name: "研", offValue: 0 },
                { name: "=", offValue: 0 },
                { name: "〇=", offValue: 1 },
                { name: "am/△=", offValue: 0.5 },
                { name: "ー", offValue: 0 },
                { name: "〇", offValue: 1 },
                { name: "早", offValue: 0 },
                { name: "遅", offValue: 0 },
                { name: "土残", offValue: 0 },
                { name: "日勤", offValue: 0 },
                { name: "am/△", offValue: 0.5 },
                { name: "△/pm", offValue: 0.5 },
                { name: "am/有", offValue: 0.5 },
                { name: "有/pm", offValue: 0.5 },
                { name: "am/欠", offValue: 0.5 },
                { name: "欠/pm", offValue: 0.5 },
                { name: "有", offValue: 1 },
                { name: "△/有", offValue: 1 },
                { name: "有/△", offValue: 1 },
                { name: "特", offValue: 1 },
                { name: "欠", offValue: 0 },
                { name: "有/欠", offValue: 0.5 },
                { name: "欠/有", offValue: 0.5 },
                { name: "病", offValue: 0 },
                { name: "病/欠", offValue: 0 },
                { name: "忌", offValue: 1 },
                { name: "産", offValue: 1 },
                { name: "育", offValue: 1 },
                { name: "看", offValue: 0.5 },
                { name: "在", offValue: 0 },
                { name: "在/△", offValue: 0.5 },
                { name: "△/在", offValue: 0.5 },
                { name: "在/有", offValue: 0.5 },
                { name: "有/在", offValue: 0.5 },
                { name: "措", offValue: 0 },
                { name: "am/措", offValue: 0 },
                { name: "措/pm", offValue: 0 },
                { name: "措/△", offValue: 0.5 },
                { name: "△/措", offValue: 0.5 },
                { name: "措/有", offValue: 0.5 },
                { name: "有/措", offValue: 0.5 }
            ], 
            globalSchedule: {},
            duties: {},
        };

        function loadData() {
            const saved = localStorage.getItem("gemini_duty_system_v11_state");
            if (saved) {
                const parsed = JSON.parse(saved);
                state.staffsData = parsed.staffsData || state.staffsData;
                state.duties = parsed.duties || state.duties;
                state.globalSchedule = parsed.globalSchedule || state.globalSchedule;
                state.baseOffDays = parsed.baseOffDays !== undefined ? parsed.baseOffDays : 9;
                
                if (parsed.dutyStyles) {
                    parsed.dutyStyles.forEach(s => {
                        if (!state.dutyStyles.some(x => x.name === s.name)) {
                            state.dutyStyles.push(s);
                        }
                    });
                }
            }
            if (!state.staffsData.some(u => u.role === 'admin')) {
                state.staffsData.unshift({ name: "管理者", pass: "admin", role: "admin" });
            }
        }

        function saveData() {
            localStorage.setItem("gemini_duty_system_v11_state", JSON.stringify(state));
        }

        function getDaysInMonth(yearMonth) {
            const [year, month] = yearMonth.split('-').map(Number);
            return new Date(year, month, 0).getDate();
        }

        function getDefaultDutyForDate(dateStr) {
            const dateObj = new Date(dateStr);
            const dayOfWeek = dateObj.getDay();
            if (dayOfWeek === 0 || HOLIDAYS_2026.includes(dateStr)) return "〇";
            if (dayOfWeek === 6) return "am/△";
            return "/";
        }

        function getDayBgClass(dateStr) {
            const dateObj = new Date(dateStr);
            const dayOfWeek = dateObj.getDay();
            if (dayOfWeek === 0 || HOLIDAYS_2026.includes(dateStr)) return "bg-red-50/50";
            if (dayOfWeek === 6) return "bg-blue-50/50";
            return "";
        }

        function populateDefaultDuties() {
            const daysInMonth = getDaysInMonth(state.currentMonth);
            state.staffsData.forEach(user => {
                const name = user.name;
                if (!state.duties[name]) state.duties[name] = {};
                for (let d = 1; d <= daysInMonth; d++) {
                    const dateStr = `${state.currentMonth}-${String(d).padStart(2, '0')}`;
                    if (!state.duties[name][dateStr] || state.duties[name][dateStr].d1 === "" || state.duties[name][dateStr].d1 === "ー") {
                        state.duties[name][dateStr] = { d1: getDefaultDutyForDate(dateStr), d2: "", bg: "" };
                    }
                }
            });
            saveData();
        }

        function initLoginSelect() {
            const select = document.getElementById("loginUserSelect");
            select.innerHTML = "";
            state.staffsData.forEach(user => {
                const opt = document.createElement("option");
                opt.value = user.name;
                opt.textContent = user.name + (user.role === 'admin' ? ' (管理者)' : '');
                select.appendChild(opt);
            });
        }

        function handleLogin() {
            const name = document.getElementById("loginUserSelect").value;
            const pass = document.getElementById("loginPassword").value;
            const matchedUser = state.staffsData.find(u => u.name === name && u.pass === pass);
            if(matchedUser) {
                state.currentUser = matchedUser.name;
                state.isAdmin = (matchedUser.role === 'admin');
                document.getElementById("loginScreen").classList.add("hidden");
                document.getElementById("mainSystem").classList.remove("hidden");
                document.getElementById("loginPassword").value = "";
                populateDefaultDuties();
                renderAll();
            } else {
                alert("❌ パスワードが正しくありません。");
            }
        }

        function handleLogout() {
            state.currentUser = "";
            state.isAdmin = false;
            document.getElementById("mainSystem").classList.add("hidden");
            document.getElementById("loginScreen").classList.remove("hidden");
            initLoginSelect();
        }

        const weekDaysJa = ["日", "月", "火", "水", "木", "金", "土"];
        
        function getHeaderCellClass(dateStr, dayOfWeek) {
            if (dayOfWeek === 0 || HOLIDAYS_2026.includes(dateStr)) return "text-red-500 bg-red-100/60";
            if (dayOfWeek === 6) return "text-blue-500 bg-blue-100/60";
            return "";
        }

        function renderAll() {
            renderTableHeaders();
            renderTableBody();
            renderTotals();
            updateAdminUIControls();
        }

        function updateAdminUIControls() {
            document.getElementById("baseOffDays").value = state.baseOffDays;
            const status = document.getElementById("loginStatus");
            const adminConfig = document.getElementById("adminConfig");
            if (state.isAdmin) {
                status.innerHTML = `<i class="fa-solid fa-user-shield mr-1"></i> ${state.currentUser}`;
                adminConfig.classList.remove("hidden");
                document.getElementById("btnDutyMgmt").classList.remove("hidden");
                document.getElementById("btnStaffMgmt").classList.remove("hidden");
            } else {
                status.innerHTML = `<i class="fa-solid fa-user mr-1"></i> ${state.currentUser}`;
                adminConfig.classList.add("hidden");
                document.getElementById("btnDutyMgmt").classList.add("hidden");
                document.getElementById("btnStaffMgmt").classList.add("hidden");
            }
        }

        function renderTableHeaders() {
            const daysInMonth = getDaysInMonth(state.currentMonth);
            const [year, month] = state.currentMonth.split('-').map(Number);

            const rowDays = document.getElementById("headerRowDays");
            const rowWeeks = document.getElementById("headerRowWeeks");
            const rowGlobal = document.getElementById("globalScheduleRow");

            rowDays.innerHTML = `<th class="sticky-col border p-1 text-center bg-gray-100 font-bold">名前</th><th class="sticky-col-2 border p-1 text-center bg-gray-100 font-bold">区分</th>`;
            rowWeeks.innerHTML = `<th class="sticky-col border p-0.5 text-center bg-gray-50"></th><th class="sticky-col-2 border p-0.5 text-center bg-gray-50"></th>`;
            rowGlobal.innerHTML = `<td class="sticky-col border p-1 bg-amber-50 font-bold text-center global-cell align-middle text-xs">共通予定</td><td class="sticky-col-2 border p-1 bg-amber-50 text-center font-bold global-cell align-middle text-xs">全員可</td>`;

            for (let d = 1; d <= daysInMonth; d++) {
                const dateObj = new Date(year, month - 1, d);
                const dayOfWeek = dateObj.getDay();
                const dateStr = `${state.currentMonth}-${String(d).padStart(2, '0')}`;
                const cellBgColor = getHeaderCellClass(dateStr, dayOfWeek);

                const thDay = document.createElement("th");
                thDay.className = `border p-1 text-center duty-cell ${cellBgColor}`;
                thDay.textContent = d;
                rowDays.appendChild(thDay);

                const thWeek = document.createElement("th");
                thWeek.className = `border p-1 text-center duty-cell ${cellBgColor}`;
                thWeek.textContent = weekDaysJa[dayOfWeek];
                rowWeeks.appendChild(thWeek);

                const tdGlobal = document.createElement("td");
                tdGlobal.className = `border duty-cell global-cell p-0 ${getDayBgClass(dateStr)} relative`;
                const val = state.globalSchedule[dateStr] || "";
                tdGlobal.innerHTML = `
                    <textarea data-date="${dateStr}" 
                        class="global-input w-full h-full p-1 text-center bg-transparent border-none focus:ring-1 focus:ring-amber-400 text-[10px] resize-none vertical-text" 
                        ${!state.isAdmin ? 'disabled' : ''}>${val}</textarea>`;
                rowGlobal.appendChild(tdGlobal);
            }
        }

        function renderTableBody() {
            const tbody = document.getElementById("dutyTableBody");
            tbody.innerHTML = "";
            const daysInMonth = getDaysInMonth(state.currentMonth);

            state.staffsData.forEach(user => {
                if (user.role === 'admin') return;

                const name = user.name;
                const offCount = calculateOffDays(name);
                
                let nameCellClass = "text-gray-700 bg-white";
                let rowBgClass = "";
                
                if (offCount > state.baseOffDays) {
                    nameCellClass = "text-red-700 bg-red-100";
                    rowBgClass = "bg-red-50/40";
                } else if (offCount < state.baseOffDays) {
                    nameCellClass = "text-orange-700 bg-orange-100";
                    rowBgClass = "bg-orange-50/30";
                }

                const tr1 = document.createElement("tr");
                tr1.className = rowBgClass;

                const tdName = document.createElement("td");
                tdName.className = `sticky-col border p-0.5 font-bold text-xs text-center align-middle ${nameCellClass}`;
                tdName.rowSpan = 2;
                tdName.innerHTML = `<div class="truncate max-w-[65px]">${name}</div><div class="text-[9px] font-normal text-gray-400 mt-0.5">公:${offCount}</div>`;
                tr1.appendChild(tdName);

                const tdType1 = document.createElement("td");
                tdType1.className = "sticky-col-2 border p-0.5 text-[10px] text-gray-500 text-center bg-gray-50 font-medium align-middle";
                tdType1.textContent = "勤務";
                tr1.appendChild(tdType1);

                const tr2 = document.createElement("tr");
                tr2.className = rowBgClass;
                
                const tdType2 = document.createElement("td");
                tdType2.className = "sticky-col-2 border p-0.5 text-[10px] text-gray-500 text-center bg-gray-50 font-medium align-middle";
                tdType2.textContent = "メモ";
                tr2.appendChild(tdType2);

                const canEdit = state.isAdmin || (state.currentUser === name);

                for (let d = 1; d <= daysInMonth; d++) {
                    const dateStr = `${state.currentMonth}-${String(d).padStart(2, '0')}`;
                    const cellData = state.duties[name][dateStr] || { d1: "", d2: "", bg: "" };
                    const colBgClass = cellData.bg || getDayBgClass(dateStr);

                    const tdCell1 = document.createElement("td");
                    tdCell1.className = `border duty-cell p-0 transition-all ${colBgClass} relative font-bold text-[11px] text-gray-800 select-none ${canEdit ? 'cursor-pointer hover:bg-indigo-50/80' : ''}`;
                    tdCell1.innerHTML = `<div class="w-full h-full flex items-center justify-center">${cellData.d1 || "ー"}</div>`;
                    
                    if (canEdit) {
                        tdCell1.addEventListener("click", () => openDutySelector(name, dateStr));
                        if(state.isAdmin) {
                            tdCell1.addEventListener("contextmenu", (e) => showColorPicker(e, name, dateStr));
                        }
                    }
                    tr1.appendChild(tdCell1);

                    const tdCell2 = document.createElement("td");
                    tdCell2.className = `border duty-cell p-0 ${colBgClass}`;
                    if (canEdit) {
                        tdCell2.innerHTML = `
                            <input type="text" value="${cellData.d2}" data-name="${name}" data-date="${dateStr}" data-row="d2" 
                                class="duty-input w-full h-full text-center bg-transparent border-none text-[10px] text-gray-600 focus:ring-1 focus:ring-indigo-400 p-0 m-0">`;
                    } else {
                        tdCell2.innerHTML = `<div class="w-full h-full flex items-center justify-center text-[9px] text-gray-400 truncate">${cellData.d2}</div>`;
                    }
                    tr2.appendChild(tdCell2);
                }

                tbody.appendChild(tr1);
                tbody.appendChild(tr2);
            });
        }

        function openDutySelector(name, dateStr) {
            state.activeCellTarget = { name, dateStr };
            const modal = document.getElementById("dutySelectorModal");
            const title = document.getElementById("selectorModalTitle");
            const sub = document.getElementById("selectorModalSub");
            const grid = document.getElementById("dutySelectorGrid");
            
            title.textContent = `${name} さんの勤務選択`;
            sub.textContent = `対象日: ${dateStr}`;
            grid.innerHTML = "";
            
            state.dutyStyles.forEach(style => {
                const btn = document.createElement("button");
                const currentVal = state.duties[name][dateStr].d1;
                
                btn.className = `p-2.5 text-xs sm:text-sm font-bold border rounded-lg transition-all text-center truncate shadow-sm active:scale-95
                    ${currentVal === style.name 
                        ? 'bg-indigo-600 text-white border-indigo-600 ring-2 ring-indigo-200' 
                        : 'bg-gray-50 hover:bg-indigo-50 text-gray-700 border-gray-200'}`;
                
                btn.textContent = style.name || "ー";
                btn.addEventListener("click", () => {
                    state.duties[name][dateStr].d1 = style.name;
                    saveData();
                    renderAll();
                    toggleModal("dutySelectorModal", false);
                });
                grid.appendChild(btn);
            });
            
            toggleModal("dutySelectorModal", true);
        }

        function calculateOffDays(name) {
            if (!state.duties[name]) return 0;
            let totalOff = 0;
            const daysInMonth = getDaysInMonth(state.currentMonth);
            for (let d = 1; d <= daysInMonth; d++) {
                const dateStr = `${state.currentMonth}-${String(d).padStart(2, '0')}`;
                if (state.duties[name][dateStr]) {
                    const d1 = state.duties[name][dateStr].d1;
                    const matchedStyle = state.dutyStyles.find(s => s.name === d1);
                    if (matchedStyle) totalOff += Number(matchedStyle.offValue);
                }
            }
            return totalOff;
        }

        function renderTotals() {
            const footer = document.getElementById("totalCountRow");
            footer.innerHTML = `<td class="sticky-col border p-1 text-center bg-indigo-50 font-bold text-xs">出勤人数</td><td class="sticky-col-2 border p-0.5 bg-indigo-50"></td>`;
            const daysInMonth = getDaysInMonth(state.currentMonth);
            
            for (let d = 1; d <= daysInMonth; d++) {
                const dateStr = `${state.currentMonth}-${String(d).padStart(2, '0')}`;
                let leftCount = 0;
                let rightCount = 0;

                state.staffsData.forEach(user => {
                    if (user.role === 'admin') return;
                    const name = user.name;
                    if (state.duties[name] && state.duties[name][dateStr]) {
                        const d1 = state.duties[name][dateStr].d1;
                        if (d1 === "/" || d1 === "am/△") leftCount++;
                        if (d1 === "/" || d1 === "△/pm") rightCount++;
                    }
                });

                const td = document.createElement("td");
                td.className = "border text-center p-0.5 duty-cell bg-indigo-100/70 text-indigo-900 font-mono text-[9px] font-bold align-middle";
                td.textContent = `${leftCount}/${rightCount}`;
                footer.appendChild(td);
            }
        }

        function showColorPicker(e, name, date) {
            e.preventDefault();
            if (!state.isAdmin) return;
            const colors = [
                { class: "", label: "クリア" },
                { class: "bg-yellow-200", label: "黄" },
                { class: "bg-blue-200", label: "青" },
                { class: "bg-green-200", label: "緑" }
            ];
            const menu = document.createElement("div");
            menu.className = "fixed bg-white border shadow-xl rounded-lg p-1.5 flex space-x-1 z-[200] text-xs";
            menu.style.top = `${e.clientY}px`;
            menu.style.left = `${e.clientX}px`;

            colors.forEach(c => {
                const btn = document.createElement("button");
                btn.className = `px-2 py-1.5 rounded border font-bold ${c.class || 'bg-white'}`;
                btn.textContent = c.label;
                btn.onclick = () => {
                    state.duties[name][date].bg = c.class;
                    saveData();
                    renderAll();
                    document.body.removeChild(menu);
                };
                menu.appendChild(btn);
            });
            document.body.appendChild(menu);
            const closeMenu = (ev) => {
                if (!menu.contains(ev.target)) {
                    document.body.removeChild(menu);
                    document.removeEventListener('click', closeMenu);
                }
            };
            setTimeout(() => document.addEventListener('click', closeMenu), 10);
        }

        function toggleModal(modalId, show) {
            const modal = document.getElementById(modalId);
            if(show) { modal.classList.remove("hidden"); modal.classList.add("flex"); } 
            else { modal.classList.add("hidden"); modal.classList.remove("flex"); }
        }

        function renderDutyMgmtList() {
            const list = document.getElementById("dutyManagementList");
            list.innerHTML = "";
            state.dutyStyles.forEach((style, index) => {
                if(style.name === "") return;
                const div = document.createElement("div");
                div.className = "flex justify-between items-center p-2 hover:bg-gray-50 text-xs";
                div.innerHTML = `
                    <div class="font-bold text-gray-700"><span>${style.name}</span><span class="text-[10px] text-gray-400 ml-2 font-normal">(公休数: ${style.offValue})</span></div>
                    ${state.isAdmin ? `<button class="text-red-500 hover:text-red-700 font-bold" onclick="deleteDutyStyle(${index})">削除</button>` : ''}
                `;
                list.appendChild(div);
            });
        }

        function cleanSymbolForExcel(val) {
            if (!val) return "ー";
            return val.replace(/〇/g, "○");
        }

        function exportToExcelCustom() {
            const daysInMonth = getDaysInMonth(state.currentMonth);
            const [year, month] = state.currentMonth.split('-').map(Number);
            let matrix = [];
            
            let r1 = ["名前", "区分"];
            for(let d=1; d<=daysInMonth; d++) r1.push(d);
            matrix.push(r1);
            
            let r2 = ["", ""];
            for(let d=1; d<=daysInMonth; d++) {
                const dateObj = new Date(year, month - 1, d);
                r2.push(weekDaysJa[dateObj.getDay()]);
            }
            matrix.push(r2);
            
            let r3 = ["共通予定", "全員可"];
            for(let d=1; d<=daysInMonth; d++) {
                const dateStr = `${state.currentMonth}-${String(d).padStart(2, '0')}`;
                r3.push(state.globalSchedule[dateStr] || "");
            }
            matrix.push(r3);
            
            state.staffsData.forEach(user => {
                if(user.role === 'admin') return;
                const name = user.name;
                const offCount = calculateOffDays(name);
                let rowDuty = [`${name} (公休:${offCount})`, "勤務"];
                let rowMemo = ["", "メモ"];
                
                for(let d=1; d<=daysInMonth; d++) {
                    const dateStr = `${state.currentMonth}-${String(d).padStart(2, '0')}`;
                    const cell = state.duties[name]?.[dateStr] || {d1:"", d2:""};
                    rowDuty.push(cleanSymbolForExcel(cell.d1));
                    rowMemo.push(cell.d2 || "");
                }
                matrix.push(rowDuty);
                matrix.push(rowMemo);
            });
            
            let rTotal = ["出勤人数", ""];
            for(let d=1; d<=daysInMonth; d++) {
                const dateStr = `${state.currentMonth}-${String(d).padStart(2, '0')}`;
                let leftCount = 0, rightCount = 0;
                state.staffsData.forEach(user => {
                    if (user.role === 'admin') return;
                    const d1 = state.duties[user.name]?.[dateStr]?.d1;
                    if (d1 === "/" || d1 === "am/△") leftCount++;
                    if (d1 === "/" || d1 === "△/pm") rightCount++;
                });
                rTotal.push(`${leftCount}/${rightCount}`);
            }
            matrix.push(rTotal);
            
            const ws = XLSX.utils.aoa_to_sheet(matrix);
            ws['!rows'] = [];
            ws['!rows'][2] = { hpt: 60 }; 
            
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "勤務表");
            XLSX.writeFile(wb, `勤務表_${state.currentMonth}.xlsx`);
        }

        function renderStaffMgmtList() {
            const list = document.getElementById("staffManagementList");
            list.innerHTML = "";
            state.staffsData.forEach((user, index) => {
                const div = document.createElement("div");
                div.className = "flex flex-wrap items-center justify-between p-2 gap-2 text-xs";
                const deleteBtnHtml = user.role === 'admin' 
                    ? `<span class="text-[11px] text-gray-400 font-bold px-1">変更不可</span>` 
                    : `<button class="text-red-500 hover:text-red-700 font-bold" onclick="deleteStaff(${index})">削除</button>`;

                div.innerHTML = `
                    <div class="flex items-center space-x-2">
                        <span class="font-bold text-gray-700 w-16 truncate">${user.name}</span>
                        <span class="text-gray-400 text-[11px]">パス:</span>
                        <input type="text" value="${user.pass}" class="border border-gray-300 rounded text-xs px-1.5 py-0.5 w-20 font-mono" onchange="updateStaffPassword(${index}, this.value)">
                    </div>
                    ${deleteBtnHtml}
                `;
                list.appendChild(div);
            });
        }

        window.updateStaffPassword = function(index, newPassword) {
            if(!state.isAdmin) return;
            if(!newPassword.trim()) return;
            state.staffsData[index].pass = newPassword.trim();
            saveData();
            renderStaffMgmtList();
        };

        window.deleteStaff = function(index) {
            if(!state.isAdmin) return;
            if (confirm(`本当に ${state.staffsData[index].name} さんを削除しますか？`)) {
                state.staffsData.splice(index, 1);
                saveData();
                renderStaffMgmtList();
                renderAll();
            }
        };

        window.deleteDutyStyle = function(index) {
            if(!state.isAdmin) return;
            if (confirm(`勤務形態「${state.dutyStyles[index].name}」を削除しますか？`)) {
                state.dutyStyles.splice(index, 1);
                saveData();
                renderDutyMgmtList();
                renderAll();
            }
        };

        document.addEventListener("DOMContentLoaded", () => {
            loadData();
            initLoginSelect();
            document.getElementById("authBtn").addEventListener("click", handleLogin);
            document.getElementById("logoutBtn").addEventListener("click", handleLogout);
            document.getElementById("closeSelectorModal").addEventListener("click", () => toggleModal("dutySelectorModal", false));
            
            document.getElementById("monthSelect").addEventListener("change", (e) => { 
                state.currentMonth = e.target.value; 
                populateDefaultDuties();
                renderAll(); 
            });
            document.getElementById("saveConfigBtn").addEventListener("click", () => {
                if(!state.isAdmin) return;
                const val = parseInt(document.getElementById("baseOffDays").value, 10);
                state.baseOffDays = isNaN(val) ? 9 : val; 
                saveData(); renderAll(); 
                alert(`🎯 公休基準値を「 ${state.baseOffDays} 日 」に一括適用しました。`);
            });
            document.getElementById("dutyTable").addEventListener("change", (e) => {
                if (e.target.classList.contains("duty-input")) {
                    const { name, date, row } = e.target.dataset;
                    state.duties[name][date][row] = e.target.value;
                    saveData(); renderAll();
                }
                if (e.target.tagName === "TEXTAREA" && e.target.classList.contains("global-input")) {
                    const { date } = e.target.dataset;
                    state.globalSchedule[date] = e.target.value;
                    saveData(); renderAll();
                }
            });
            document.getElementById("btnDutyMgmt").addEventListener("click", () => { if(!state.isAdmin) return; renderDutyMgmtList(); toggleModal("dutyModal", true); });
            document.getElementById("closeDutyModal").addEventListener("click", () => toggleModal("dutyModal", false));
            document.getElementById("btnStaffMgmt").addEventListener("click", () => { if(!state.isAdmin) return; renderStaffMgmtList(); toggleModal("staffModal", true); });
            document.getElementById("closeStaffModal").addEventListener("click", () => toggleModal("staffModal", false));
            
            document.getElementById("addDutyBtn").addEventListener("click", () => {
                if(!state.isAdmin) return;
                const nameInput = document.getElementById("newDutyName");
                const valInput = document.getElementById("newDutyOffValue");
                const styleName = nameInput.value.trim();
                if(styleName) {
                    if(state.dutyStyles.some(s => s.name === styleName)) { alert("既に存在します。"); return; }
                    state.dutyStyles.push({ name: styleName, offValue: parseFloat(valInput.value) });
                    nameInput.value = "";
                    saveData(); renderDutyMgmtList(); renderAll();
                }
            });

            document.getElementById("addStaffBtn").addEventListener("click", () => {
                if(!state.isAdmin) return;
                const nameInput = document.getElementById("newStaffName");
                const passInput = document.getElementById("newStaffPass");
                const nameVal = nameInput.value.trim();
                const passVal = passInput.value.trim();
                if(nameVal && passVal) {
                    if(state.staffsData.some(u => u.name === nameVal)) { alert("既に登録されています。"); return; }
                    state.staffsData.push({ name: nameVal, pass: passVal, role: "user" });
                    nameInput.value = ""; passInput.value = "1234";
                    saveData(); populateDefaultDuties(); renderStaffMgmtList(); renderAll();
                }
            });

            document.getElementById("btnExcel").addEventListener("click", exportToExcelCustom);
            document.getElementById("btnPdf").addEventListener("click", () => {
                const element = document.getElementById("tableContainer");
                const opt = {
                    margin: 5,
                    filename: `勤務表_${state.currentMonth}.pdf`,
                    html2canvas: { scale: 2, useCORS: true },
                    jsPDF: { unit: 'mm', format: 'a3', orientation: 'landscape' }
                };
                html2pdf().set(opt).from(element).save();
            });
            document.getElementById("btnEmail").addEventListener("click", () => {
                window.location.href = `mailto:?subject=${encodeURIComponent(`勤務表_${state.currentMonth}`)}`;
            });
        });
    </script>
</body>
</html>
