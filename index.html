<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>リアルタイム勤務表システム Pro V20.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --cell-width: 44px; --cell-height: 24px; --global-ratio: 3.0; }
        .duty-cell { min-width: var(--cell-width) !important; max-width: var(--cell-width) !important; width: var(--cell-width) !important; height: var(--cell-height) !important; text-align: center; font-size: 11px; white-space: nowrap; overflow: hidden; }
        .global-cell { height: calc(var(--cell-height) * var(--global-ratio)) !important; min-height: calc(var(--cell-height) * var(--global-ratio)) !important; max-height: calc(var(--cell-height) * var(--global-ratio)) !important; padding: 0 !important; overflow: hidden !important; }
        .global-input-container { display: flex !important; width: 100% !important; height: 100% !important; overflow: hidden !important; }
        .global-input { width: 50% !important; height: 100% !important; resize: none !important; border: none !important; background: transparent !important; outline: none !important; font-size: 10px; }
        .sticky-col { position: sticky; left: 0; background: white; z-index: 20; min-width: 70px; max-width: 70px; }
        .sticky-col-2 { position: sticky; left: 70px; background: white; z-index: 20; min-width: 36px; max-width: 36px; }
        .vertical-text { writing-mode: vertical-rl; text-orientation: mixed; white-space: nowrap; font-size: 10px; text-align: center; padding: 2px 0 !important; }
        .user-select-btn { width: 100%; padding: 12px; background: #f9fafb; border: 2px solid #e5e7eb; border-radius: 12px; font-weight: bold; color: #4b5563; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">

    <div id="loginScreen" class="flex items-center justify-center min-h-screen p-4">
        <div class="bg-white rounded-2xl shadow-xl max-w-sm w-full p-6 border">
            <h2 class="text-xl font-bold text-center mb-6">ログイン</h2>
            <button id="openUserModalBtn" class="user-select-btn mb-4 hover:bg-indigo-50 flex items-center justify-center">
                <i class="fa-solid fa-user mr-2"></i><span id="selectedUserLabel">職員を選択してください</span>
            </button>
            <input type="hidden" id="loginUserHidden">
            <input type="password" id="loginPassword" placeholder="パスワード" class="w-full border rounded-lg px-3 py-3 mb-4 text-sm focus:ring-2 focus:ring-indigo-500">
            <button id="authBtn" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-lg">ログイン</button>
        </div>
    </div>

    <div id="mainSystem" class="hidden">
        <nav class="bg-indigo-600 text-white p-3 flex justify-between items-center sticky top-0 z-50">
            <span class="font-bold">勤務管理 Pro</span>
            <button id="logoutBtn" class="bg-indigo-800 px-3 py-1 rounded text-xs">ログアウト</button>
        </nav>

        <main class="p-2 space-y-4 max-w-7xl mx-auto">
            <div class="bg-slate-800 text-white rounded-xl p-4 grid grid-cols-3 gap-2">
                <div class="text-[10px]">幅<input type="range" id="inputCellWidth" min="30" max="80" value="44" class="w-full"></div>
                <div class="text-[10px]">高<input type="range" id="inputCellHeight" min="18" max="40" value="24" class="w-full"></div>
                <div class="text-[10px]">予定比<input type="range" id="inputGlobalRatio" min="1.5" max="6" step="0.5" value="3" class="w-full"></div>
            </div>

            <div id="tableContainer" class="bg-white p-2 rounded shadow overflow-x-auto">
                <table class="table-fixed w-max" id="dutyTable">
                    <thead id="dutyTableHead"></thead>
                    <tbody id="dutyTableBody"></tbody>
                </table>
            </div>
        </main>
    </div>

    <div id="userSelectorModal" class="fixed inset-0 bg-black/60 hidden items-center justify-center z-[100] p-3">
        <div class="bg-white rounded-xl max-w-sm w-full p-4 max-h-[80vh] flex flex-col">
            <h3 class="font-bold mb-4">職員を選択</h3>
            <div id="userSelectorGrid" class="grid grid-cols-2 gap-2 overflow-y-auto"></div>
        </div>
    </div>
    <div id="dutySelectorModal" class="fixed inset-0 bg-black/60 hidden items-center justify-center z-[100] p-3">
        <div class="bg-white rounded-xl max-w-sm w-full p-4 shadow-xl max-h-[85vh] flex flex-col">
            <h3 class="font-bold mb-4" id="selectorModalTitle">勤務を選択</h3>
            <div id="dutySelectorGrid" class="grid grid-cols-3 gap-2 overflow-y-auto"></div>
        </div>
    </div>

    <script>
        let state = {
            currentUser: "", isAdmin: false, currentMonth: "2026-05",
            staffsData: [{ name: "管理者", pass: "admin", role: "admin" }, { name: "佐藤", pass: "1234", role: "user" }],
            duties: {}, globalScheduleMeet: {},
            dutyStyles: [{ name: "/", offValue: 0 }, { name: "〇", offValue: 1 }, { name: "早", offValue: 0 }, { name: "遅", offValue: 0 }]
        };

        function toggleModal(id, show) { document.getElementById(id).style.display = show ? "flex" : "none"; }

        // 職員選択モーダル生成
        function openUserSelector() {
            const grid = document.getElementById("userSelectorGrid");
            grid.innerHTML = "";
            state.staffsData.forEach(user => {
                const btn = document.createElement("button");
                btn.className = "p-3 bg-gray-50 border rounded-lg font-bold text-sm hover:bg-indigo-100";
                btn.textContent = user.name;
                btn.onclick = () => {
                    document.getElementById("selectedUserLabel").textContent = user.name;
                    document.getElementById("loginUserHidden").value = user.name;
                    toggleModal("userSelectorModal", false);
                };
                grid.appendChild(btn);
            });
            toggleModal("userSelectorModal", true);
        }

        // 画面レンダリング（簡略版）
        function renderAll() {
            document.documentElement.style.setProperty('--cell-width', document.getElementById('inputCellWidth').value + 'px');
            document.documentElement.style.setProperty('--cell-height', document.getElementById('inputCellHeight').value + 'px');
            document.documentElement.style.setProperty('--global-ratio', document.getElementById('inputGlobalRatio').value);
            // 本来のレンダリングロジックをここに記述...
        }

        document.getElementById("openUserModalBtn").addEventListener("click", openUserSelector);
        document.getElementById("authBtn").addEventListener("click", () => {
            const name = document.getElementById("loginUserHidden").value;
            if (name) {
                document.getElementById("loginScreen").classList.add("hidden");
                document.getElementById("mainSystem").classList.remove("hidden");
                renderAll();
            } else { alert("職員を選んでください"); }
        });
        document.getElementById("logoutBtn").addEventListener("click", () => location.reload());
        
        // スライダー調整時のリアルタイム反映
        ["inputCellWidth", "inputCellHeight", "inputGlobalRatio"].forEach(id => {
            document.getElementById(id).addEventListener("input", renderAll);
        });
    </script>
</body>
</html>
